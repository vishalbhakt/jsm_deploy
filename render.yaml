databases:
  # 1. PostgreSQL Database
  - name: jsm-db
    plan: free # Change to starter for production usage

services:
  # 2. Django Backend
  - type: web
    name: jsm-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "cd backend && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jsm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*" # Note: In a strict prod environment, replace this with the actual render domain.
      - key: CORS_ALLOWED_ORIGINS
        value: "https://jsm-frontend.onrender.com" # We will sync this with the frontend service name below
      - key: CLOUDINARY_CLOUD_NAME
        value: "your-cloudinary-name" # Fill these in the Render dashboard later
      - key: CLOUDINARY_API_KEY
        value: "your-cloudinary-key"
      - key: CLOUDINARY_API_SECRET
        value: "your-cloudinary-secret"
    rootDir: backend
